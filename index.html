<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>9178</title>
    <style type="text/css">
        body {
            background-color: #FFEBEE;
            color: #42A5F5;
            text-align: center;
            padding-top:200px
        }
        .box {
            width: 130px;
            height: 25px;
            background-color: green;
            margin: 10px auto;
            padding: 0;
            border-radius: 15px;
        }
        h3 {
            color: white;
            margin: 0;
        }
        /* 新的 flex 容器：两行两列 */
        .flex-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            width: 300px;
            margin: 20px auto;
        }
        .green-box {
            width: 130px;
            height: 25px;
            background-color: green;
            border-radius: 15px;
            text-align: center;
            line-height: 25px;
            margin-bottom: 15px;       /* 行间距 */
            overflow: hidden;
        }
        .green-box a {
            display: block;
            width: 100%;
            height: 100%;
            color: white;
            text-decoration: none;
            font-style: italic;
        }
        .green-box a:hover {
            background-color: #2e7d32;
        }
        /* 最后一行不需要下边距（可选） */
        .green-box:nth-last-child(-n+2) {
            margin-bottom: 0;
        }
    </style>
</head>
<body>
    <img src="3.jpg" width="150px" height="150px" alt="对不起没有买服务器图片不能正常显示">
    <h1><i>《IKUN的秘密》</i></h1>

    <div class="box">
        <i><h3>神秘的链接</h3></i>
    </div>

    <div class="flex-container">

        <div class="green-box"><a href="https://www.jm2app.net/">禁漫天堂</a></div>
        <div class="green-box"><a href="https://aqtw.qq.com/act/a20251011version/m/index.html">GalGame</a></div>
        <div class="green-box"><a href="https://www.ciallo.run/">Ciallo(∠・ω< )⌒☆</a></div>
    </div>
</body>
</html>
